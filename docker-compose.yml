services:
  # 1. Векторная база данных
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API (для нашего Go клиента)
    volumes:
      - ./data/qdrant_storage:/qdrant/storage:z
    restart: always

  # 2. Кэш для сессий (история переписки)
  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ./redis_data:/data

  # 3. Нейросеть (Ollama)
  # Если у вас уже стоит Ollama на компьютере локально, этот блок можно убрать,
  # но тогда в конфиге Go нужно указывать host.docker.internal или localhost
  ollama:
    image: ollama/ollama:latest
    environment:
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_MAX_LOADED_MODELS=2
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama_models:/root/.ollama
    # Если у вас есть GPU (Nvidia), раскомментируйте строки ниже:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always

